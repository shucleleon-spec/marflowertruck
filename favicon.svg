<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#FAF7F4"/>
  
  <!-- Truck body -->
  <rect x="3" y="16" width="18" height="10" rx="2" fill="#8FAF8C"/>
  <!-- Truck cabin -->
  <rect x="21" y="18" width="8" height="8" rx="2" fill="#6B4F3A"/>
  <!-- Window -->
  <rect x="22.5" y="19.5" width="5" height="4" rx="1" fill="#C8E6FA"/>
  <!-- Wheels -->
  <circle cx="8" cy="27" r="3" fill="#6B4F3A"/>
  <circle cx="8" cy="27" r="1.5" fill="#FAF7F4"/>
  <circle cx="23" cy="27" r="3" fill="#6B4F3A"/>
  <circle cx="23" cy="27" r="1.5" fill="#FAF7F4"/>
  
  <!-- Flowers on truck -->
  <!-- Flower 1 -->
  <circle cx="7" cy="13" r="2.5" fill="#E8C5B8"/>
  <circle cx="7" cy="13" r="1.2" fill="#C99282"/>
  <line x1="7" y1="15.5" x2="7" y2="17" stroke="#5E8A5B" stroke-width="1"/>
  
  <!-- Flower 2 -->
  <circle cx="13" cy="11" r="2.5" fill="#C99282"/>
  <circle cx="13" cy="11" r="1.2" fill="#FAF7F4"/>
  <line x1="13" y1="13.5" x2="13" y2="17" stroke="#5E8A5B" stroke-width="1"/>
  
  <!-- Flower 3 -->
  <circle cx="19" cy="12.5" r="2.5" fill="#E8C5B8"/>
  <circle cx="19" cy="12.5" r="1.2" fill="#C99282"/>
  <line x1="19" y1="15" x2="19" y2="17" stroke="#5E8A5B" stroke-width="1"/>

  <!-- Small leaves -->
  <ellipse cx="10" cy="14.5" rx="2" ry="1" fill="#8FAF8C" transform="rotate(-30 10 14.5)"/>
  <ellipse cx="16" cy="13.5" rx="2" ry="1" fill="#8FAF8C" transform="rotate(20 16 13.5)"/>
</svg>
